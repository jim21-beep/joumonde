<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat – Joumonde</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #d4af37;
            --gold-dark: #c9a961;
            --bg: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --text: #f5f0e8;
            --text-muted: #888;
            --border: #2a2a2a;
        }

        html, body {
            height: 100%;
            font-family: 'Georgia', serif;
            background: var(--bg);
            color: var(--text);
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Navbar ── */
        .chat-navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .chat-navbar .logo {
            color: var(--gold);
            font-size: 1.4rem;
            letter-spacing: 0.2em;
            text-decoration: none;
            font-weight: bold;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.35rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .logout-btn:hover { border-color: var(--gold); color: var(--gold); }

        /* ── Login screen ── */
        #chat-login {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }

        .login-box h2 {
            color: var(--gold);
            text-align: center;
            margin-bottom: 0.4rem;
            letter-spacing: 0.05em;
        }

        .login-box .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.88rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .form-field {
            margin-bottom: 0.9rem;
        }

        .form-field input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-field input:focus { border-color: var(--gold); }

        .btn-gold {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 0.25rem;
            transition: opacity 0.2s;
        }
        .btn-gold:hover { opacity: 0.9; }
        .btn-gold:disabled { opacity: 0.45; cursor: not-allowed; }

        .login-error {
            color: #e74c3c;
            font-size: 0.82rem;
            text-align: center;
            margin-top: 0.75rem;
            min-height: 1.2em;
        }

        .login-register-hint {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }
        .login-register-hint a { color: var(--gold); }

        /* ── Chat App ── */
        #chat-app {
            flex: 1;
            display: none;
            overflow: hidden;
            min-height: 0;
        }

        /* ── Admin layout ── */
        .admin-layout {
            display: flex;
            height: 100%;
        }

        .sessions-panel {
            width: 280px;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sessions-panel h3 {
            padding: 1.1rem 1.25rem;
            color: var(--gold);
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sessions-list {
            overflow-y: auto;
            flex: 1;
        }

        .session-item {
            padding: 0.9rem 1.25rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }
        .session-item:hover { background: var(--bg-card); }
        .session-item.active { background: var(--bg-card); border-left-color: var(--gold); }

        .session-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.2rem; }
        .session-email { font-size: 0.77rem; color: var(--text-muted); }
        .session-time { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.2rem; }

        .no-sessions {
            padding: 2rem 1.25rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ── Customer layout ── */
        .customer-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 820px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── Chat window (shared) ── */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .chat-header {
            padding: 0.9rem 1.5rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ecc71;
            flex-shrink: 0;
            box-shadow: 0 0 6px #2ecc71;
        }

        .chat-header h4 { font-size: 0.95rem; }
        .chat-header p { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.1rem; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            min-height: 0;
        }

        .msg-wrapper-sent     { align-self: flex-end;   display: flex; flex-direction: column; align-items: flex-end;   max-width: 70%; }
        .msg-wrapper-received { align-self: flex-start; display: flex; flex-direction: column; align-items: flex-start; max-width: 70%; }

        .bubble {
            padding: 0.65rem 1rem;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.55;
            word-break: break-word;
        }
        .bubble.sent {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #1a1a1a;
            border-radius: 14px 14px 3px 14px;
        }
        .bubble.received {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px 14px 14px 3px;
        }

        .msg-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .chat-input-area {
            padding: 0.9rem 1.5rem;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.6rem;
            flex-shrink: 0;
            align-items: flex-end;
        }

        .chat-input-area textarea {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            resize: none;
            outline: none;
            height: 44px;
            max-height: 120px;
            line-height: 1.4;
            transition: border-color 0.2s;
        }
        .chat-input-area textarea:focus { border-color: var(--gold); }

        .send-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.1rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.88rem;
        }
        .empty-chat .icon { font-size: 2.8rem; margin-bottom: 0.25rem; }

        .info-msg {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.82rem;
            margin: 1.5rem auto;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        @media (max-width: 640px) {
            .sessions-panel { width: 100%; }
            .msg-wrapper-sent, .msg-wrapper-received { max-width: 85%; }
            .chat-navbar { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="chat-navbar">
    <a href="shop.html" class="logo">JOUMONDE</a>
    <div class="nav-right">
        <span id="user-email-display"></span>
        <button class="logout-btn" onclick="logout()">Abmelden</button>
    </div>
</nav>

<!-- Login screen -->
<div id="chat-login">
    <div class="login-box">
        <h2>💬 Live Chat</h2>
        <p class="subtitle">Meld dich mit deinem Joumonde-Konto an,<br>um den Support-Chat zu starten.</p>
        <form onsubmit="loginUser(event)">
            <div class="form-field">
                <input type="email" id="login-email" placeholder="E-Mail-Adresse" autocomplete="email" required>
            </div>
            <div class="form-field">
                <input type="password" id="login-password" placeholder="Passwort" required>
            </div>
            <button type="submit" class="btn-gold" id="login-btn">Anmelden &amp; Chat starten</button>
        </form>
        <p class="login-error" id="login-error"></p>
        <p class="login-register-hint">
            Noch kein Konto? <a href="shop.html">Jetzt registrieren</a>
        </p>
    </div>
</div>

<!-- Chat app (injected after login) -->
<div id="chat-app"></div>

<script>
    const SUPABASE_URL  = 'https://sbxffjszderijikxarho.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_-oz4PzN9unCmYbUfMLHczg_AD1DcP8y';
    const ADMIN_EMAIL   = 'info@joumonde.com';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    let currentUser   = null;
    let isAdmin       = false;
    let activeSession = null;
    let chatChannel   = null;
    let sessionsData  = {};   // sessionId → session object (admin only)

    // ── Init ───────────────────────────────────────────────────────────────────
    (async () => {
        const { data: { user } } = await sb.auth.getUser();
        if (user) await afterLogin(user);
    })();

    // ── Auth ───────────────────────────────────────────────────────────────────
    async function loginUser(e) {
        e.preventDefault();
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn      = document.getElementById('login-btn');
        const errEl    = document.getElementById('login-error');

        btn.disabled    = true;
        btn.textContent = 'Anmelden…';
        errEl.textContent = '';

        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) {
            errEl.textContent = 'Falsche E-Mail oder Passwort.';
            btn.disabled    = false;
            btn.textContent = 'Anmelden & Chat starten';
            return;
        }
        await afterLogin(data.user);
    }

    async function logout() {
        if (chatChannel) sb.removeChannel(chatChannel);
        await sb.auth.signOut();
        currentUser = null; isAdmin = false; activeSession = null; chatChannel = null;
        document.getElementById('chat-app').innerHTML = '';
        document.getElementById('chat-app').style.display = 'none';
        document.getElementById('chat-login').style.display = 'flex';
        document.getElementById('user-email-display').textContent = '';
    }

    async function afterLogin(user) {
        currentUser = user;
        isAdmin     = user.email === ADMIN_EMAIL;
        document.getElementById('user-email-display').textContent = user.email;
        document.getElementById('chat-login').style.display  = 'none';
        document.getElementById('chat-app').style.display    = 'flex';
        document.getElementById('chat-app').style.flexDirection = 'column';

        if (isAdmin) await buildAdminView();
        else         await buildCustomerView();
    }

    // ── Admin View ─────────────────────────────────────────────────────────────
    async function buildAdminView() {
        document.getElementById('chat-app').innerHTML = `
            <div class="admin-layout">
                <div class="sessions-panel">
                    <h3>Aktive Chats</h3>
                    <div class="sessions-list" id="sessions-list">
                        <div class="no-sessions">Lade Chats…</div>
                    </div>
                </div>
                <div class="chat-window" id="admin-chat-window">
                    <div class="empty-chat">
                        <div class="icon">💬</div>
                        <p>Wähle einen Chat aus der linken Liste</p>
                    </div>
                </div>
            </div>`;

        await loadSessions();
        subscribeAdminToAll();
    }

    async function loadSessions() {
        const { data, error } = await sb
            .from('chat_sessions')
            .select('*')
            .order('updated_at', { ascending: false });

        const listEl = document.getElementById('sessions-list');
        if (!listEl) return;

        if (error || !data || data.length === 0) {
            listEl.innerHTML = '<div class="no-sessions">Noch keine Chats.</div>';
            return;
        }

        sessionsData = {};
        data.forEach(s => sessionsData[s.id] = s);

        listEl.innerHTML = data.map(s => `
            <div class="session-item${activeSession === s.id ? ' active' : ''}"
                 id="sitem-${s.id}"
                 onclick="adminOpenSession('${s.id}')">
                <div class="session-name">${escHtml(s.user_name || 'Gast')}</div>
                <div class="session-email">${escHtml(s.user_email)}</div>
                <div class="session-time">${new Date(s.updated_at).toLocaleString('de-DE')}</div>
            </div>`).join('');
    }

    async function adminOpenSession(sessionId) {
        activeSession = sessionId;
        const s = sessionsData[sessionId];

        document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
        const item = document.getElementById('sitem-' + sessionId);
        if (item) item.classList.add('active');

        const win = document.getElementById('admin-chat-window');
        win.innerHTML = `
            <div class="chat-header">
                <div class="online-dot"></div>
                <div>
                    <h4>${escHtml(s ? s.user_name || 'Gast' : '')}</h4>
                    <p>${escHtml(s ? s.user_email : '')}</p>
                </div>
            </div>
            <div class="messages-area" id="messages-area"></div>
            <div class="chat-input-area">
                <textarea id="chat-input" placeholder="Antwort schreiben…" onkeydown="handleEnter(event)"></textarea>
                <button class="send-btn" onclick="sendMessage()" title="Senden">➤</button>
            </div>`;

        await loadMessages(sessionId);
    }

    function subscribeAdminToAll() {
        if (chatChannel) sb.removeChannel(chatChannel);
        chatChannel = sb
            .channel('admin-all')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' },
                async (payload) => {
                    await loadSessions();
                    if (payload.new.session_id === activeSession) {
                        appendMessage(payload.new);
                    }
                })
            .subscribe();
    }

    // ── Customer View ──────────────────────────────────────────────────────────
    async function buildCustomerView() {
        document.getElementById('chat-app').innerHTML = `
            <div class="customer-layout">
                <div class="chat-window">
                    <div class="chat-header">
                        <div class="online-dot"></div>
                        <div>
                            <h4>Joumonde Support</h4>
                            <p>Wir antworten so schnell wie möglich</p>
                        </div>
                    </div>
                    <div class="messages-area" id="messages-area">
                        <div class="info-msg">Lade Chat…</div>
                    </div>
                    <div class="chat-input-area">
                        <textarea id="chat-input" placeholder="Nachricht schreiben…" onkeydown="handleEnter(event)"></textarea>
                        <button class="send-btn" onclick="sendMessage()" title="Senden">➤</button>
                    </div>
                </div>
            </div>`;

        await getOrCreateSession();
    }

    async function getOrCreateSession() {
        const { data: existing } = await sb
            .from('chat_sessions')
            .select('id')
            .eq('user_id', currentUser.id)
            .eq('status', 'open')
            .order('created_at', { ascending: false })
            .limit(1)
            .maybeSingle();

        if (existing) {
            activeSession = existing.id;
        } else {
            const { data: profile } = await sb
                .from('profiles')
                .select('first_name, last_name')
                .eq('id', currentUser.id)
                .maybeSingle();

            const userName = profile
                ? (`${profile.first_name || ''} ${profile.last_name || ''}`).trim() || currentUser.email
                : currentUser.email;

            const { data: newSess, error } = await sb
                .from('chat_sessions')
                .insert({ user_id: currentUser.id, user_email: currentUser.email, user_name: userName, status: 'open' })
                .select('id')
                .single();

            if (error) {
                document.getElementById('messages-area').innerHTML =
                    '<div class="info-msg">Chat konnte nicht gestartet werden.</div>';
                return;
            }
            activeSession = newSess.id;
        }

        await loadMessages(activeSession);
        subscribeCustomer(activeSession);
    }

    function subscribeCustomer(sessionId) {
        if (chatChannel) sb.removeChannel(chatChannel);
        chatChannel = sb
            .channel('session-' + sessionId)
            .on('postgres_changes', {
                event: 'INSERT', schema: 'public', table: 'chat_messages',
                filter: `session_id=eq.${sessionId}`
            }, (payload) => appendMessage(payload.new))
            .subscribe();
    }

    // ── Shared ─────────────────────────────────────────────────────────────────
    async function loadMessages(sessionId) {
        const { data, error } = await sb
            .from('chat_messages')
            .select('*')
            .eq('session_id', sessionId)
            .order('created_at', { ascending: true });

        const area = document.getElementById('messages-area');
        if (!area) return;

        if (error) {
            area.innerHTML = '<div class="info-msg">Nachrichten konnten nicht geladen werden.</div>';
            return;
        }
        if (!data || data.length === 0) {
            area.innerHTML = '<div class="info-msg">Schreib deine erste Nachricht…</div>';
            return;
        }

        area.innerHTML = '';
        data.forEach(msg => appendMessage(msg, false));
        area.scrollTop = area.scrollHeight;
    }

    function appendMessage(msg, scroll = true) {
        const area = document.getElementById('messages-area');
        if (!area) return;

        // Remove placeholder
        const ph = area.querySelector('.info-msg');
        if (ph) ph.remove();

        const isMine = msg.sender_id === currentUser.id;
        const time   = new Date(msg.created_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        const name   = isMine ? 'Du' : (msg.is_admin ? 'Support' : (msg.sender_name || 'Kunde'));

        const wrapper = document.createElement('div');
        wrapper.className = isMine ? 'msg-wrapper-sent' : 'msg-wrapper-received';
        wrapper.innerHTML = `
            <div class="bubble ${isMine ? 'sent' : 'received'}">${escHtml(msg.message)}</div>
            <div class="msg-meta">${escHtml(name)} · ${time}</div>`;

        area.appendChild(wrapper);
        if (scroll) area.scrollTop = area.scrollHeight;
    }

    async function sendMessage() {
        if (!activeSession) return;
        const input = document.getElementById('chat-input');
        const text  = input.value.trim();
        if (!text) return;

        const btn = document.querySelector('.send-btn');
        if (btn) btn.disabled = true;
        input.value = '';

        const { error } = await sb.from('chat_messages').insert({
            session_id:  activeSession,
            sender_id:   currentUser.id,
            sender_name: currentUser.email,
            message:     text,
            is_admin:    isAdmin
        });

        if (!error) {
            await sb.from('chat_sessions')
                .update({ updated_at: new Date().toISOString() })
                .eq('id', activeSession);
        }

        if (btn) btn.disabled = false;
        input.focus();
        autoResize(input);
    }

    function handleEnter(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
        autoResize(e.target);
    }

    function autoResize(el) {
        el.style.height = '44px';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function escHtml(str) {
        return String(str || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }
</script>
</body>
</html>
